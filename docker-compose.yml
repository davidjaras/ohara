services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ohara
      POSTGRES_PASSWORD: ohara
      POSTGRES_DB: ohara
    ports:
      # Published so host-side runs (e.g. `uv run pytest`) can reach the same DB.
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ohara -d ohara"]
      interval: 2s
      timeout: 3s
      retries: 15

  backend:
    build:
      context: .
      target: dev
    environment:
      DATABASE_URL: postgres://ohara:ohara@db:5432/ohara
      # The Vite proxy forwards requests with Host "backend:8000".
      OHARA_ALLOWED_HOSTS: localhost,127.0.0.1,backend
    command: >
      sh -c "uv run python manage.py migrate --no-input
      && (uv run python manage.py compilemessages -l es || true)
      && uv run python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app/backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:22-slim
    working_dir: /app/frontend
    environment:
      # vite.config.ts proxies API/auth/admin requests to this origin.
      OHARA_API_ORIGIN: http://backend:8000
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app/frontend
      # Keep container node_modules separate from any host install.
      - node_modules:/app/frontend/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  node_modules:
