<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="ring" x1="12" y1="12" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7CC0F0" />
      <stop offset="1" stop-color="#3E86C7" />
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#121815" />
      <stop offset="1" stop-color="#050807" />
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#tile)" />
  <g filter="url(#shadow)">
    <circle
      cx="32"
      cy="32"
      r="20"
      stroke="url(#ring)"
      stroke-width="7"
      stroke-linecap="round"
      pathLength="360"
      stroke-dasharray="310 50"
      transform="rotate(-20 32 32)"
    />
  </g>
</svg>
